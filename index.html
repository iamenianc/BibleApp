<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>The Word</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="preload" href="fonts/AtkinsonHyperlegibleNext.ttf" as="font" type="font/ttf" crossorigin />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/reader.css" />
  <link rel="stylesheet" href="css/chrome.css" />
  <link rel="stylesheet" href="css/picker.css" />
</head>
<body>

  <header id="topbar">
    <div class="bar-group bar-left">
      <button class="icon-btn" id="audio-play" aria-label="Play chapter audio">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path class="ic-play" d="M8 5v14l11-7z"/><path class="ic-pause" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button class="icon-btn" id="audio-stop" aria-label="Stop chapter audio">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h12v12H6z"/></svg>
      </button>
    </div>
    <button class="ref-btn" id="ref-display">Loading…</button>
    <div class="bar-group bar-right">
      <button class="size-btn" id="size-down" aria-label="Decrease text size">A&minus;</button>
      <button class="size-btn" id="size-up" aria-label="Increase text size">A+</button>
    </div>
  </header>

  <main id="reader" aria-live="polite"></main>

  <div id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-head">
      <span class="overlay-title" id="overlay-title">Books</span>
      <button class="overlay-close" id="overlay-close" aria-label="Close">×</button>
    </div>
    <div id="picker-list"></div>
    <div id="config-panel" aria-hidden="true">
      <div class="cfg-row">
        <span class="cfg-label">Text size</span>
        <div class="cfg-ctrl">
          <button class="cfg-btn" id="cfg-size-down" aria-label="Smaller text">A−</button>
          <span class="cfg-val" id="cfg-size-val"></span>
          <button class="cfg-btn" id="cfg-size-up" aria-label="Larger text">A+</button>
        </div>
      </div>
      <div class="cfg-row">
        <span class="cfg-label">Auto-scroll</span>
        <div class="cfg-ctrl cfg-ctrl-slider">
          <input type="range" id="cfg-pace-slider" class="cfg-slider"
                 min="0" max="300" step="5" value="100"
                 aria-label="Auto-scroll speed" />
          <span class="cfg-val" id="cfg-pace-val"></span>
        </div>
      </div>
    </div>
    <div id="config-bar" role="button" tabindex="0" aria-label="Open settings" aria-expanded="false">
      <svg class="cfg-gear" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.32.07-.66.07-1.08s-.03-.76-.07-1.08l2.32-1.8c.21-.17.27-.46.13-.7l-2.2-3.79c-.14-.25-.42-.33-.67-.25l-2.73 1.1c-.57-.44-1.18-.81-1.85-1.09l-.41-2.9c-.04-.27-.27-.46-.55-.46h-4.4c-.28 0-.5.19-.54.46l-.41 2.9c-.68.28-1.29.65-1.86 1.09l-2.73-1.1c-.25-.1-.53 0-.67.25l-2.2 3.79c-.14.25-.07.53.14.7l2.31 1.8c-.04.32-.07.65-.07 1.08s.03.76.07 1.08l-2.31 1.8c-.21.17-.28.46-.14.7l2.2 3.79c.14.25.42.33.67.25l2.73-1.1c.57.44 1.18.81 1.86 1.09l.41 2.9c.04.27.26.46.54.46h4.4c.28 0 .51-.19.55-.46l.41-2.9c.67-.28 1.28-.65 1.85-1.09l2.73 1.1c.25.1.53 0 .67-.25l2.2-3.79c.14-.24.07-.53-.13-.7l-2.32-1.8z"/>
      </svg>
      <span>Settings</span>
    </div>
  </div>

  <div id="status">
    <div class="breath"></div>
    <div id="status-text">Opening the Word</div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
